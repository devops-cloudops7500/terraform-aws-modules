name: aws-infrastructure-destroy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service stack to destroy"
        required: true
        default: "s3"
        type: choice
        options:
          - s3
          - vpc
          - subnet
          - security-group
          - ec2
          - alb
          - public-ip
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      tfvars_repository:
        description: "Repository containing environment inputs (owner/repo)"
        required: true
        default: "nishu-kumar7500/project-1"
        type: string
      tfvars_ref:
        description: "Branch or tag in inputs repository"
        required: true
        default: "main"
        type: string
      tfvars_root:
        description: "Root folder in inputs repository"
        required: true
        default: "."
        type: string
      approvers:
        description: "Comma-separated GitHub usernames allowed to approve destroy"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  plan-destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'prod' && 'production' || github.event.inputs.environment }}
    defaults:
      run:
        working-directory: services/${{ github.event.inputs.service }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: ${{ vars.PROJECT_NAME }}-${{ github.event.inputs.environment }}-${{ github.event.inputs.service }}
      TFVARS_FILE: ../../tfvars-inputs/${{ github.event.inputs.tfvars_root }}/${{ github.event.inputs.environment }}/${{ github.event.inputs.service }}/terraform.tfvars
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_cost_center: ${{ vars.COST_CENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
    steps:
      - name: Checkout Terraform repository
        uses: actions/checkout@v4

      - name: Checkout inputs repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.tfvars_repository }}
          ref: ${{ github.event.inputs.tfvars_ref }}
          token: ${{ github.token }}
          path: tfvars-inputs

      - name: Verify inputs file
        run: test -f "$TFVARS_FILE"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Ensure HCP Terraform workspace exists
        env:
          HCP_ORGANIZATION: ${{ vars.HCP_ORGANIZATION }}
        run: |
          set -euo pipefail

          API_URL="https://app.terraform.io/api/v2"
          WORKSPACE_URL="${API_URL}/organizations/${HCP_ORGANIZATION}/workspaces/${TF_WORKSPACE}"

          STATUS_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TF_TOKEN_app_terraform_io}" \
            -H "Content-Type: application/vnd.api+json" \
            "${WORKSPACE_URL}")

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "HCP Terraform workspace ${TF_WORKSPACE} already exists. Ensuring execution mode is local."

            curl -sS -X PATCH \
              -H "Authorization: Bearer ${TF_TOKEN_app_terraform_io}" \
              -H "Content-Type: application/vnd.api+json" \
              "${WORKSPACE_URL}" \
              --data '{"data":{"type":"workspaces","attributes":{"execution-mode":"local"}}}'

            exit 0
          fi

          if [ "${STATUS_CODE}" != "404" ]; then
            echo "Failed to query workspace ${TF_WORKSPACE}. HTTP status: ${STATUS_CODE}"
            exit 1
          fi

          echo "Creating HCP Terraform workspace ${TF_WORKSPACE} in organization ${HCP_ORGANIZATION}."

          curl -sS -X POST \
            -H "Authorization: Bearer ${TF_TOKEN_app_terraform_io}" \
            -H "Content-Type: application/vnd.api+json" \
            "${API_URL}/organizations/${HCP_ORGANIZATION}/workspaces" \
            --data "{\"data\":{\"type\":\"workspaces\",\"attributes\":{\"name\":\"${TF_WORKSPACE}\",\"execution-mode\":\"local\"}}}"

      - name: Create cloud config
        run: |
          cat > cloud.auto.tf <<EOF
          terraform {
            cloud {
              organization = "${{ vars.HCP_ORGANIZATION }}"

              workspaces {
                name = "${TF_WORKSPACE}"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Destroy Plan
        run: |
          set -euo pipefail

          DESTROY_VARS=()

          if [ "${{ github.event.inputs.service }}" = "s3" ]; then
            DESTROY_VARS+=("-var=force_destroy=true")
          fi

          terraform plan -destroy "${DESTROY_VARS[@]}" -var-file="$TFVARS_FILE" -out=tfdestroyplan

      - name: Upload Destroy Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfdestroyplan-${{ github.event.inputs.service }}-${{ github.event.inputs.environment }}
          path: tfdestroyplan

  wait-for-approval:
    runs-on: ubuntu-latest
    needs: [plan-destroy]
    steps:
      - name: Validate approver input
        shell: bash
        run: |
          approvers="${{ github.event.inputs.approvers }}"

          if [[ -z "$approvers" ]]; then
            echo "approvers input is required. Provide one or more GitHub usernames."
            exit 1
          fi

          IFS=',' read -ra items <<< "$approvers"
          for raw in "${items[@]}"; do
            user="$(echo "$raw" | xargs)"

            if [[ -z "$user" ]]; then
              echo "approvers contains an empty value."
              exit 1
            fi

            if [[ "$user" == *"/"* ]]; then
              echo "Use plain GitHub usernames only in approvers. Do not use org/team or owner/user syntax: '$user'"
              exit 1
            fi

            if [[ ! "$user" =~ ^[A-Za-z0-9-]+$ ]]; then
              echo "Invalid GitHub username format in approvers: '$user'"
              exit 1
            fi
          done

      - name: Manual approval before destroy
        uses: trstringer/manual-approval@v1
        timeout-minutes: 1440
        with:
          secret: ${{ github.token }}
          approvers: ${{ github.event.inputs.approvers }}
          minimum-approvals: 1
          issue-title: "Approve destroy for ${{ github.event.inputs.environment }}-${{ github.event.inputs.service }}"
          issue-body: "Approve or deny destruction of the ${{ github.event.inputs.service }} stack for environment `${{ github.event.inputs.environment }}` in workspace `${{ vars.PROJECT_NAME }}-${{ github.event.inputs.environment }}-${{ github.event.inputs.service }}`."
          exclude-workflow-initiator-as-approver: false

  apply-destroy:
    runs-on: ubuntu-latest
    needs: [wait-for-approval]
    defaults:
      run:
        working-directory: services/${{ github.event.inputs.service }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: ${{ vars.PROJECT_NAME }}-${{ github.event.inputs.environment }}-${{ github.event.inputs.service }}
      TFVARS_FILE: ../../tfvars-inputs/${{ github.event.inputs.tfvars_root }}/${{ github.event.inputs.environment }}/${{ github.event.inputs.service }}/terraform.tfvars
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_cost_center: ${{ vars.COST_CENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
    steps:
      - name: Checkout Terraform repository
        uses: actions/checkout@v4

      - name: Checkout inputs repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.tfvars_repository }}
          ref: ${{ github.event.inputs.tfvars_ref }}
          token: ${{ github.token }}
          path: tfvars-inputs

      - name: Verify inputs file
        run: test -f "$TFVARS_FILE"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Ensure HCP Terraform workspace exists
        env:
          HCP_ORGANIZATION: ${{ vars.HCP_ORGANIZATION }}
        run: |
          set -euo pipefail

          API_URL="https://app.terraform.io/api/v2"
          WORKSPACE_URL="${API_URL}/organizations/${HCP_ORGANIZATION}/workspaces/${TF_WORKSPACE}"

          STATUS_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TF_TOKEN_app_terraform_io}" \
            -H "Content-Type: application/vnd.api+json" \
            "${WORKSPACE_URL}")

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "HCP Terraform workspace ${TF_WORKSPACE} already exists. Ensuring execution mode is local."

            curl -sS -X PATCH \
              -H "Authorization: Bearer ${TF_TOKEN_app_terraform_io}" \
              -H "Content-Type: application/vnd.api+json" \
              "${WORKSPACE_URL}" \
              --data '{"data":{"type":"workspaces","attributes":{"execution-mode":"local"}}}'

            exit 0
          fi

          if [ "${STATUS_CODE}" != "404" ]; then
            echo "Failed to query workspace ${TF_WORKSPACE}. HTTP status: ${STATUS_CODE}"
            exit 1
          fi

          echo "Creating HCP Terraform workspace ${TF_WORKSPACE} in organization ${HCP_ORGANIZATION}."

          curl -sS -X POST \
            -H "Authorization: Bearer ${TF_TOKEN_app_terraform_io}" \
            -H "Content-Type: application/vnd.api+json" \
            "${API_URL}/organizations/${HCP_ORGANIZATION}/workspaces" \
            --data "{\"data\":{\"type\":\"workspaces\",\"attributes\":{\"name\":\"${TF_WORKSPACE}\",\"execution-mode\":\"local\"}}}"

      - name: Create cloud config
        run: |
          cat > cloud.auto.tf <<EOF
          terraform {
            cloud {
              organization = "${{ vars.HCP_ORGANIZATION }}"

              workspaces {
                name = "${TF_WORKSPACE}"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Download Destroy Plan Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: tfdestroyplan-${{ github.event.inputs.service }}-${{ github.event.inputs.environment }}
          path: services/${{ github.event.inputs.service }}

      - name: Ensure destroy plan file exists
        run: |
          set -euo pipefail

          if [ -f tfdestroyplan ]; then
            exit 0
          fi

          echo "Destroy plan artifact was not available. Regenerating tfdestroyplan locally."

          DESTROY_VARS=()

          if [ "${{ github.event.inputs.service }}" = "s3" ]; then
            DESTROY_VARS+=("-var=force_destroy=true")
          fi

          terraform plan -destroy "${DESTROY_VARS[@]}" -var-file="$TFVARS_FILE" -out=tfdestroyplan

      - name: Terraform Destroy Apply
        run: terraform apply -auto-approve tfdestroyplan