name: terraform-deploy-prod

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service stack"
        required: true
        type: choice
        options:
          - network
          - compute
          - storage
          - security
          - data
          - messaging

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: services/${{ github.event.inputs.service }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: prj-prod-${{ github.event.inputs.service }}
      TF_VAR_hcp_organization: ${{ vars.HCP_ORGANIZATION }}
      TF_VAR_hcp_workspace_name: prj-prod-${{ github.event.inputs.service }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_environment: prod
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_cost_center: ${{ vars.COST_CENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        run: terraform init -backend-config="organization=${{ vars.HCP_ORGANIZATION }}" -backend-config="workspaces.name=${{ env.TF_WORKSPACE }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod-${{ github.event.inputs.service }}
          path: services/${{ github.event.inputs.service }}/tfplan

  apply:
    runs-on: ubuntu-latest
    needs: [plan]
    environment: production
    defaults:
      run:
        working-directory: services/${{ github.event.inputs.service }}
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: prj-prod-${{ github.event.inputs.service }}
      TF_VAR_hcp_organization: ${{ vars.HCP_ORGANIZATION }}
      TF_VAR_hcp_workspace_name: prj-prod-${{ github.event.inputs.service }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_environment: prod
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_cost_center: ${{ vars.COST_CENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        run: terraform init -backend-config="organization=${{ vars.HCP_ORGANIZATION }}" -backend-config="workspaces.name=${{ env.TF_WORKSPACE }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod-${{ github.event.inputs.service }}
          path: services/${{ github.event.inputs.service }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
