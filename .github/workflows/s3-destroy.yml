name: s3-destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      tfvars_repository:
        description: "Repository containing environment inputs (owner/repo)"
        required: true
        default: "nishu-kumar7500/project-1"
        type: string
      tfvars_ref:
        description: "Branch or tag in inputs repository"
        required: true
        default: "main"
        type: string
      tfvars_root:
        description: "Root folder in inputs repository"
        required: true
        default: "."
        type: string
      approvers:
        description: "Comma-separated GitHub usernames allowed to approve destroy"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  plan-destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'prod' && 'production' || github.event.inputs.environment }}
    defaults:
      run:
        working-directory: services/s3
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: terraform-aws-deployment
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_cost_center: ${{ vars.COST_CENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
    steps:
      - name: Checkout Terraform repository
        uses: actions/checkout@v4

      - name: Checkout inputs repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.tfvars_repository }}
          ref: ${{ github.event.inputs.tfvars_ref }}
          token: ${{ github.token }}
          path: tfvars-inputs

      - name: Verify inputs file
        run: test -f ../../tfvars-inputs/${{ github.event.inputs.tfvars_root }}/${{ github.event.inputs.environment }}/terraform.tfvars

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Create cloud config
        run: |
          cat > cloud.auto.tf <<EOF
          terraform {
            cloud {
              organization = "nishu7500"

              workspaces {
                name = "terraform-aws-deployment"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Destroy Plan
        run: terraform plan -destroy -var="force_destroy=true" -var-file=../../tfvars-inputs/${{ github.event.inputs.tfvars_root }}/${{ github.event.inputs.environment }}/terraform.tfvars -out=tfdestroyplan

      - name: Upload Destroy Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfdestroyplan-s3-${{ github.event.inputs.environment }}
          path: services/s3/tfdestroyplan

  wait-for-approval:
    runs-on: ubuntu-latest
    needs: [plan-destroy]
    steps:
      - name: Validate approver input
        shell: bash
        run: |
          approvers="${{ github.event.inputs.approvers }}"

          if [[ -z "$approvers" ]]; then
            echo "approvers input is required. Provide one or more GitHub usernames."
            exit 1
          fi

          IFS=',' read -ra items <<< "$approvers"
          for raw in "${items[@]}"; do
            user="$(echo "$raw" | xargs)"

            if [[ -z "$user" ]]; then
              echo "approvers contains an empty value."
              exit 1
            fi

            if [[ "$user" == *"/"* ]]; then
              echo "Use plain GitHub usernames only in approvers. Do not use org/team or owner/user syntax: '$user'"
              exit 1
            fi

            if [[ ! "$user" =~ ^[A-Za-z0-9-]+$ ]]; then
              echo "Invalid GitHub username format in approvers: '$user'"
              exit 1
            fi
          done

      - name: Manual approval before destroy
        uses: trstringer/manual-approval@v1
        timeout-minutes: 1440
        with:
          secret: ${{ github.token }}
          approvers: ${{ github.event.inputs.approvers }}
          minimum-approvals: 1
          issue-title: "Approve destroy for ${{ github.event.inputs.environment }}"
          issue-body: "Approve or deny destruction of the S3 stack for environment `${{ github.event.inputs.environment }}` in workspace `terraform-aws-deployment`."
          exclude-workflow-initiator-as-approver: false

  apply-destroy:
    runs-on: ubuntu-latest
    needs: [wait-for-approval]
    defaults:
      run:
        working-directory: services/s3
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: terraform-aws-deployment
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_cost_center: ${{ vars.COST_CENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
    steps:
      - name: Checkout Terraform repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Create cloud config
        run: |
          cat > cloud.auto.tf <<EOF
          terraform {
            cloud {
              organization = "nishu7500"

              workspaces {
                name = "terraform-aws-deployment"
              }
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Download Destroy Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfdestroyplan-s3-${{ github.event.inputs.environment }}
          path: services/s3

      - name: Terraform Destroy Apply
        run: terraform apply -auto-approve tfdestroyplan